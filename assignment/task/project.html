<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mondrian Project</title>
    <style>
      .box{
        height: 748px;
        width: 748px;
        background-color: black;
      }
      .box1{
        background-color: #E72F24;
        height: 414px;
        width: 320px;
      }
      .box2,.box3, .box4, .box7 ,.box6{
        background-color: #F0F1EC;
      }
      .first{
        display: grid;
        grid-template-columns: 1fr 3fr;
        gap: 9px;
      }
      .second{
        display: grid;
        grid-template-columns: 1fr 2fr 1fr ;
        height: 748px;
        width: 320px;
        gap: 9px;
      }
      .box3{
        height: 290px;
        width: 320px;
        
      }
      .box4{
        width: 351px;
        height: 290px;
      }
      .box5{
        background-color: #004592;
        height: 130px;
        width: 50px;
      }
      .box6{
        width: 50px;
        height: 179px;
        display: grid;
        grid-row: span 2;
      }
      .third{
        display: grid;
        grid-template-rows: 130px 184px;
        gap: 10px;
      }
      .fourth{
        display: grid;
        
        gap: 9px;
      }
      .box7{
        height: 20px;
        width: 320px;
      }
      .box8{
        height: 20px;
        width: 198px;
        background-color: #F9D01E ;
      }
      .box9{
        background-color: black;
        height: 20px;
        width: 153px;
      }
      /* 
    Write your CSS here 
    Gap Colour: #000
    White: #F0F1EC
    Red: #E72F24
    Black: #232629
    Blue: #004592
    Yellow: #F9D01E

    For dimensions, see dimensions.png image.
    HINT: Remember you can't change the properties of grid lines.
    But grid lines are transparent!
    */
    </style>
  </head>

  <body>
    <div class="box">
      <div class="first">
    <div class="box1"></div>
    <div class="box2"></div>
    </div>
    <div class="second">
    <div class="box3"></div>
    <div class="box4"></div>
    <div class="third">
    <div class="box5"></div>
    <div class="box6"></div>
    </div>
    </div>
    <div class="fourth">
    <div class="box7"></div>
    <div class="box8"></div>
    <div class="box9"></div>
    </div>
    </div>
  </body>
</html>
