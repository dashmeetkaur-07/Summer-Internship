<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
</head>
<body>
    <h2>Registration Form</h2>
    <form>
        <label>Full Name:</label>
        <input type="text" name="name" placeholder="Enter your Full Name" required/>
        <br/><br/>
        <label > Email:</label>
        <input type="email" name="email" placeholder="Enter your email" required/>
        <br/><br/>
        <label>Mobile No.:</label>
        <input type="tel" name="Mobile" placeholder="Enter your mobile number" required/>
        <br/><br/>
        <label>Password:</label>
        <input type="password" name="password" placeholder="Enter your password" required/>
        <br/><br/>
        <label>Gender:</label>
        <input type="radio" name="gender"/>Male
        <input type="radio" name="gender"/>Female
        <input type="radio" name="gender"/>Other
        <br/><br/>
        <label>Courses:</label>
        <select>
            <option>BTech</option>
            <option>BA</option>
            <option>BBA</option>
            <option>Bsc</option>
        </select>
        <br/><br/>
        <label>Skills:</label>
        <input type="checkbox" name="skills"/>HTML
        <input type="checkbox" name="skills"/>CSS
        <input type="checkbox" name="skills"/>JAVASCRIPT
        <br/><br/>
        <label>Address:</label>
        <textarea rows="4" cols="30" placeholder="Enter your address"></textarea>
        <br/><br/>
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
    </form>
</body>
</html>
