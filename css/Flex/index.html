<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flex</title>
    <style>
        .container{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .box{
            border: 2px solid black;
            height: 100px;
            width:150px;
            background-color: aquamarine;
            box-shadow: 0px 5px 10px gray;
            margin: 10px;
            text-align: center;
            font-style: italic;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box">HTML</div>
      <div class="box">CSS</div>
      <div class="box">JavaScript</div>
      </div>
  </body>
</html>
