<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .block{
            display: block;
            background-color: lightblue;
            margin: 5px;
        }
        .inline{
            display: inline;
            background-color: lightcyan;
        }
        .inlineblock{
            display: inline-block;
            width: 120px;
            height: 50px;
            background-color: orange;
            margin: 5px;
        }
    </style>
</head>
<body>
    <h2>Display:Block</h2>
    <div class="block">HTML</div>
    <div class="block">CSS</div>
    <div class="block">Javascript</div>
    <hr/>
     <h2>Display:Inline</h2>
    <div class="inline">HTML</div>
    <div class="inline">CSS</div>
    <div class="inline">Javascript</div>
    <hr/>
    <h2>Display:InlineBlock</h2>
    <div class="inlineblock">HTML</div>
    <div class="inlineblock">CSS</div>
    <div class="inlineblock">Javascript</div>
    <hr/>
</body>
</html>
