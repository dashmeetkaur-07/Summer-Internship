<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Card</title>
    <style>
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        grid-template-rows: 1fr 1fr 1fr;
        gap: 20px;
      }
      img {
        margin-left: 20px;
        height: 300px;
        width: 450px;
        object-fit: cover;
        display: block;
        transition: 0.4s;
       
      }

      .profile {
        overflow: hidden;
        border-radius: 15px;
        position: relative;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        cursor: pointer;
      }
      .profile img:hover{
        /* transform: scale(0.8); */
        /* transform: rotate3d(1,1,0,180deg); */
        transform: rotate(180deg);
            }
    </style>
  </head>

    <div class="grid">
      <div class="profile">
