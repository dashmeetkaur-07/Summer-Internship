<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chess</title>
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
      .beige {
        background-color: #f0d9b5;
        height: 100px;
        border: 1px solid black;
      }
      .brown {
        background-color: #b58863;
        height: 100px;
        border: 1px solid black;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr;
        grid-template-rows: 1fr 1fr 1fr 1fr 1fr 1fr 1fr 1fr;
      }
      i{
        font-size: 50px;
        color: rgb(20, 19, 19);
        margin-left: 75px;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div class="beige"><i class="fa-solid fa-chess-rook"></i></div>
      <div class="brown"><i class="fa-solid fa-chess-knight"></i></div>
      <div class="beige"><i class="fa-regular fa-chess-bishop"></i></div>
      <div class="brown"><i class="fa-solid fa-chess-king"></i></div>
      <div class="beige"><i class="fa-solid fa-chess-queen"></i></div>
      <div class="brown"><i class="fa-regular fa-chess-bishop"></i></div>
      <div class="beige"><i class="fa-solid fa-chess-knight"></i></div>
      <div class="brown"><i class="fa-solid fa-chess-rook"></i></div>
      <div class="brown"><i class="fa-solid fa-chess-pawn"></i></div>
      <div class="beige"><i class="fa-solid fa-chess-pawn"></i></div>
      <div class="brown"><i class="fa-solid fa-chess-pawn"></i></div>
      <div class="beige"><i class="fa-solid fa-chess-pawn"></i></div>
      <div class="brown"><i class="fa-solid fa-chess-pawn"></i></div>
      <div class="beige"><i class="fa-solid fa-chess-pawn"></i></div>
      <div class="brown"><i class="fa-solid fa-chess-pawn"></i></div>
      <div class="beige"><i class="fa-solid fa-chess-pawn"></i></div>
      <div class="beige"></div>
      <div class="brown"></div>
      <div class="beige"></div>
      <div class="brown"></div>
      <div class="beige"></div>
      <div class="brown"></div>
      <div class="beige"></div>
      <div class="brown"></div>
      <div class="brown"></div>
      <div class="beige"></div>
      <div class="brown"></div>
      <div class="beige"></div>
      <div class="brown"></div>
      <div class="beige"></div>
      <div class="brown"></div>
      <div class="beige"></div>
      <div class="beige"></div>
      <div class="brown"></div>
      <div class="beige"></div>
      <div class="brown"></div>
      <div class="beige"></div>
      <div class="brown"></div>
      <div class="beige"></div>
      <div class="brown"></div>
      <div class="brown"></div>
      <div class="beige"></div>
      <div class="brown"></div>
      <div class="beige"></div>
      <div class="brown"></div>
      <div class="beige"></div>
      <div class="brown"></div>
      <div class="beige"></div>

      <div class="beige"><i class="fa-solid fa-chess-pawn" style="color: white;"></i></div>
      <div class="brown"><i class="fa-solid fa-chess-pawn" style="color: white;"></i></div>
      <div class="beige"><i class="fa-solid fa-chess-pawn" style="color: white;"></i></div>
      <div class="brown"><i class="fa-solid fa-chess-pawn" style="color: white;"></i></div>
      <div class="beige"><i class="fa-solid fa-chess-pawn" style="color: white;"></i></div>
      <div class="brown"><i class="fa-solid fa-chess-pawn" style="color: white;"></i></div>
      <div class="beige"><i class="fa-solid fa-chess-pawn" style="color: white;"></i></div>
      <div class="brown"><i class="fa-solid fa-chess-pawn" style="color: white;"></i></div>
      <div class="brown"><i class="fa-solid fa-chess-rook" style="color: white;"></i></div>
      <div class="beige"><i class="fa-solid fa-chess-knight"style="color: white;"></i></div>
      <div class="brown"><i class="fa-regular fa-chess-bishop" style="color: white;"></i></div>
      <div class="beige"><i class="fa-solid fa-chess-king" style="color: white;"></i></div>
      <div class="brown"><i class="fa-solid fa-chess-queen"style="color: white;"></i></div>
      <div class="beige"><i class="fa-regular fa-chess-bishop"style="color: white;"></i></div>
      <div class="brown"><i class="fa-solid fa-chess-knight"style="color: white;"></i></div>
      <div class="beige"><i class="fa-solid fa-chess-rook"style="color: white;"></i></div>
    </div>
  </body>
</html>
