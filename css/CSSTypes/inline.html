<!-- where the css can be applied on any line-->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline CSS</title>
 </head>
 <body>
    <h1 style="color: red;">Inline CSS</h1>
    <p style="font-size: 70px;">This is an example of inline css</p>
 </body>
 </html>
