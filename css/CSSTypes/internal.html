<!--In this we will create an style tag inside head tag-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Internal CSS</title>
    <style>
        h1{
            color: blue;
        }
        p{
            color: blue;
            font-size: 50px;
        }
    </style>
    
</head>
<body>
    <h1>Internal CSS</h1>
    <p>This is an example of internal css</p>
</body>
</html>
