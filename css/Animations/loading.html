<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation Loader</title>
    <style>
        body{
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: rgb(143, 190, 174);
    }
    .loading{
        height: 200px;
        width: 200px;
        border: 10px solid lightblue;
        display: flex;
        justify-content: center;
        align-items: center;
        border-radius: 50%;
        border-top: 10px solid blue;
        animation: loading 1.5s linear infinite ;
    }
    
    @keyframes loading{
        from{
            transform: rotate(0deg);
  }
        to{
            transform: rotate(360deg);
        }
    }
    .loading2{
        height: 100px;
        width: 100px;
        border: 10px solid lightblue;
        border-radius: 50%;
        border-top: 10px solid blue;
        animation: loading2 1s linear infinite ;
    }

    @keyframes loading2{
        from{
            transform: rotate(360deg);
  }
        to{
            transform: rotate(0deg);
        }
    }
    </style>
</head>
<body>
    <div class="loading"><div class="loading2"></div>    </div>
    
</body>
</html>
